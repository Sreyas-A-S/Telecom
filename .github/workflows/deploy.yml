name: 🚀 Production Deploy

on:
  push:
    branches:
      - main

jobs:
  production-deploy:
    runs-on: ubuntu-latest

    # This creates a temporary database inside the GitHub Action runner
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: runner_db
          MYSQL_USER: runner_user
          MYSQL_PASSWORD: runner_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🧾 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, pdo_mysql, bcmath, gd
          coverage: none

      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: 🛠️ Prepare Application
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --force
          mkdir -p storage/framework/{sessions,views,cache}
          chmod -R 775 storage bootstrap/cache

      - name: 🗄️ Database Check (Runner Only)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: runner_db
          DB_USERNAME: runner_user
          DB_PASSWORD: runner_password
        run: php artisan migrate --force

      - name: 📂 FTP Deploy to Production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/crm/ # Adjust to your server path
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            tests/**
            storage/logs/*
